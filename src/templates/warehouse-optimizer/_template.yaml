key: warehouse-optimizer
name: Warehouse Optimization Team
description: A team of logistics specialists that analyzes inventory, layout, demand patterns, and creates an optimization plan
goal_template: |
  Assemble a warehouse optimization team to: {user_input}

  Create specialists for: inventory analysis, warehouse layout optimization, demand forecasting, and implementation planning.
  Inventory analysis and demand forecasting can run in parallel.
  Layout optimization should be blocked by inventory analysis (needs ABC classification data).
  Implementation planning should be blocked by all three analysis tasks.
