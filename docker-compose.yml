version: '3.8'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm
      POSTGRES_DB: swarm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm"]
      interval: 2s
      timeout: 5s
      retries: 5

  # Migrations: run manually with `alembic upgrade head` (see README)

  swarm:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SWARM_API_KEY=${SWARM_API_KEY:-}
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://swarm:swarm@postgres:5432/swarm
    volumes:
      - ./workdir:/app/workdir
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
